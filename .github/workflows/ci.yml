name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Node tests
        run: node --test tests/*.node.test.mjs
